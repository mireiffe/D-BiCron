<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D-BiCron // coredb scheduler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #12122a;
      --bg-mid: #181838;
      --surface: #1e1e42;
      --surface-hi: #26264e;
      --text: #e4e2f0;
      --text-dim: #7b7898;
      --text-bright: #ffffff;

      --cyan: #00e5ff;
      --cyan-dim: rgba(0, 229, 255, .15);
      --cyan-glow: rgba(0, 229, 255, .25);
      --lime: #c8ff00;
      --lime-dim: rgba(200, 255, 0, .12);
      --lime-glow: rgba(200, 255, 0, .2);
      --magenta: #ff2d8a;
      --magenta-dim: rgba(255, 45, 138, .12);
      --magenta-glow: rgba(255, 45, 138, .2);
      --yellow: #ffd000;
      --yellow-dim: rgba(255, 208, 0, .12);
      --red: #ff3355;
      --green: #00e676;

      --border-w: 2.5px;
      --shadow-cyan: 4px 4px 0 var(--cyan-glow);
      --shadow-lime: 4px 4px 0 var(--lime-glow);
      --shadow-magenta: 4px 4px 0 var(--magenta-glow);
      --font-display: 'Rajdhani', sans-serif;
      --font-code: 'Fira Code', monospace;
      --radius: 3px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-code);
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      background-image:
        linear-gradient(30deg, var(--bg-mid) 12%, transparent 12.5%, transparent 87%, var(--bg-mid) 87.5%, var(--bg-mid)),
        linear-gradient(150deg, var(--bg-mid) 12%, transparent 12.5%, transparent 87%, var(--bg-mid) 87.5%, var(--bg-mid)),
        linear-gradient(30deg, var(--bg-mid) 12%, transparent 12.5%, transparent 87%, var(--bg-mid) 87.5%, var(--bg-mid)),
        linear-gradient(150deg, var(--bg-mid) 12%, transparent 12.5%, transparent 87%, var(--bg-mid) 87.5%, var(--bg-mid)),
        linear-gradient(60deg, rgba(24, 24, 56, .7) 25%, transparent 25.5%, transparent 75%, rgba(24, 24, 56, .7) 75%),
        linear-gradient(60deg, rgba(24, 24, 56, .7) 25%, transparent 25.5%, transparent 75%, rgba(24, 24, 56, .7) 75%);
      background-size: 40px 70px;
      background-position: 0 0, 0 0, 20px 35px, 20px 35px, 0 0, 20px 35px;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.04) 3px, rgba(0,0,0,.04) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    .glow-bar {
      height: 3px;
      background: linear-gradient(90deg, var(--cyan), var(--lime), var(--magenta), var(--cyan));
      background-size: 300% 100%;
      animation: glowSlide 6s linear infinite;
      box-shadow: 0 0 10px var(--cyan-glow), 0 2px 20px var(--cyan-glow);
    }
    @keyframes glowSlide { 0%{background-position:0% 0} 100%{background-position:300% 0} }

    .header {
      background: var(--surface);
      border-bottom: var(--border-w) solid var(--cyan);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 20px rgba(0, 229, 255, .08);
    }
    .header-left { display: flex; align-items: baseline; gap: 14px; }
    .logo {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 22px;
      color: var(--cyan);
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 0 15px var(--cyan-glow), 0 0 40px rgba(0, 229, 255, .12);
    }
    .logo-sub { font-family: var(--font-code); font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }
    .status-pill {
      display: flex; align-items: center; gap: 6px;
      border: 1.5px solid var(--green); border-radius: 20px;
      padding: 3px 12px 3px 8px;
      font-family: var(--font-display); font-size: 11px; font-weight: 600;
      color: var(--green); letter-spacing: 1.5px; text-transform: uppercase;
      background: rgba(0, 230, 118, .06);
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 8px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .dashboard { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 52px); }

    .sidebar {
      background: rgba(20, 20, 48, .6);
      backdrop-filter: blur(8px);
      border-right: var(--border-w) solid rgba(0, 229, 255, .2);
      padding: 18px 14px;
      display: flex; flex-direction: column; gap: 12px; overflow-y: auto;
    }

    .main { padding: 18px 20px; display: flex; flex-direction: column; gap: 18px; }
    .main-row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }

    .stitle {
      font-family: var(--font-display); font-size: 12px; font-weight: 700;
      color: var(--text); text-transform: uppercase; letter-spacing: 2.5px;
      margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
    }
    .stitle-tag {
      font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 2px;
      letter-spacing: 1px; border: 2px solid; font-family: var(--font-display);
    }
    .stitle-tag.cyan  { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-dim); }
    .stitle-tag.lime  { border-color: var(--lime); color: var(--lime); background: var(--lime-dim); }
    .stitle-tag.mag   { border-color: var(--magenta); color: var(--magenta); background: var(--magenta-dim); }
    .stitle-tag.yel   { border-color: var(--yellow); color: var(--yellow); background: var(--yellow-dim); }
    .stitle .count {
      font-family: var(--font-code); font-size: 10px;
      background: var(--surface); color: var(--cyan);
      padding: 1px 7px; border-radius: 2px; border: 1px solid rgba(0, 229, 255, .3);
    }

    .card {
      background: var(--surface);
      border: var(--border-w) solid rgba(0, 229, 255, .35);
      border-radius: var(--radius);
      box-shadow: var(--shadow-cyan);
      transition: transform .1s, box-shadow .1s, border-color .15s;
    }
    .card:hover { border-color: rgba(0, 229, 255, .55); transform: translate(-1px, -1px); box-shadow: 6px 6px 0 var(--cyan-glow); }
    .card-body { padding: 16px; }
    .card.mag-card { border-color: rgba(255, 45, 138, .35); box-shadow: var(--shadow-magenta); }
    .card.mag-card:hover { border-color: rgba(255, 45, 138, .55); box-shadow: 6px 6px 0 var(--magenta-glow); }

    .job-card {
      background: var(--surface);
      border: var(--border-w) solid rgba(200, 255, 0, .3);
      border-left: 5px solid var(--lime);
      border-radius: var(--radius); padding: 12px;
      box-shadow: 3px 3px 0 var(--lime-glow);
      transition: transform .1s, box-shadow .1s, border-color .15s;
      margin-bottom: 8px;
    }
    .job-card:hover { border-color: rgba(200, 255, 0, .5); transform: translate(-1px, -1px); box-shadow: 5px 5px 0 var(--lime-glow); }
    .job-name { font-family: var(--font-display); font-weight: 700; font-size: 14px; color: var(--text-bright); margin-bottom: 2px; }
    .job-desc { font-size: 11px; color: var(--text-dim); margin-bottom: 10px; }
    .job-actions { display: flex; gap: 8px; align-items: center; }
    .field-inline { display: flex; align-items: center; gap: 4px; }
    .field-inline label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; }
    .field-inline input {
      width: 46px; background: var(--bg); border: 2px solid rgba(200, 255, 0, .25);
      border-radius: 3px; color: var(--lime); font-family: var(--font-code);
      font-size: 12px; padding: 3px 6px; text-align: center;
    }
    .field-inline input:focus { outline: none; border-color: var(--lime); box-shadow: 0 0 8px var(--lime-glow); }

    .btn {
      display: inline-flex; align-items: center; gap: 4px; cursor: pointer;
      border: var(--border-w) solid; border-radius: var(--radius);
      font-family: var(--font-display); font-weight: 700; font-size: 11px;
      letter-spacing: 1px; text-transform: uppercase; padding: 5px 14px;
      transition: all .1s; white-space: nowrap;
    }
    .btn:active { transform: translate(2px, 2px); }
    .btn-lime { background: var(--bg); border-color: var(--lime); color: var(--lime); box-shadow: 3px 3px 0 var(--lime-glow); }
    .btn-lime:hover { background: var(--lime); color: var(--bg); box-shadow: 3px 3px 0 var(--lime-glow), 0 0 15px var(--lime-glow); }
    .btn-cyan { background: var(--bg); border-color: var(--cyan); color: var(--cyan); box-shadow: 3px 3px 0 var(--cyan-glow); }
    .btn-cyan:hover { background: var(--cyan); color: var(--bg); box-shadow: 3px 3px 0 var(--cyan-glow), 0 0 15px var(--cyan-glow); }
    .btn-red { background: var(--bg); border-color: var(--red); color: var(--red); box-shadow: 3px 3px 0 rgba(255, 51, 85, .2); }
    .btn-red:hover { background: var(--red); color: #fff; box-shadow: 3px 3px 0 rgba(255, 51, 85, .2), 0 0 15px rgba(255, 51, 85, .2); }
    .btn-sm { padding: 3px 10px; font-size: 10px; }
    .btn:disabled { opacity: .35; pointer-events: none; }

    .sched-form { display: flex; gap: 10px; align-items: end; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field-label { font-family: var(--font-display); font-size: 10px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; }
    .field select, .field input {
      background: var(--bg); border: 2px solid rgba(0, 229, 255, .25);
      border-radius: var(--radius); color: var(--text);
      font-family: var(--font-code); font-size: 12px; padding: 6px 10px;
    }
    .field select:focus, .field input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 10px var(--cyan-glow); }
    .field select { cursor: pointer; }
    .field select option { background: var(--surface); }

    .tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
    .tbl th {
      text-align: left; font-family: var(--font-display); font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.5px; padding: 8px 10px; border-bottom: 2px solid;
    }
    .tbl th:first-child { border-radius: var(--radius) 0 0 0; }
    .tbl th:last-child { border-radius: 0 var(--radius) 0 0; }
    .tbl.cyan-tbl th { color: var(--cyan); border-bottom-color: rgba(0, 229, 255, .3); background: rgba(0, 229, 255, .05); }
    .tbl.mag-tbl th { color: var(--magenta); border-bottom-color: rgba(255, 45, 138, .3); background: rgba(255, 45, 138, .05); }
    .tbl td { padding: 7px 10px; border-bottom: 1px solid rgba(255, 255, 255, .05); vertical-align: middle; }
    .tbl tbody tr { transition: background .1s; }
    .tbl tbody tr:hover { background: rgba(255, 255, 255, .03); }
    .tbl code {
      display: inline-block; background: var(--bg); color: var(--lime);
      padding: 2px 8px; border-radius: 3px; border: 1px solid rgba(200, 255, 0, .2); font-size: 11px;
    }

    .badge {
      display: inline-block; padding: 2px 9px; border-radius: 3px;
      font-family: var(--font-display); font-size: 10px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase; border: 2px solid;
    }
    .badge-ok { border-color: var(--lime); color: var(--lime); background: var(--lime-dim); text-shadow: 0 0 6px var(--lime-glow); }
    .badge-fail { border-color: var(--red); color: var(--red); background: rgba(255, 51, 85, .1); text-shadow: 0 0 6px rgba(255, 51, 85, .3); }

    .empty { color: var(--text-dim); text-align: center; padding: 22px 14px; font-size: 12px; border: 2px dashed rgba(255, 255, 255, .08); border-radius: var(--radius); }

    .output-cell {
      max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-size: 11px; color: var(--text-dim); cursor: pointer;
    }
    .output-cell:hover { color: var(--cyan); }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(12, 12, 30, .7);
      backdrop-filter: blur(4px); z-index: 2000;
      display: flex; align-items: center; justify-content: center;
      animation: modalFadeIn .15s ease-out;
    }
    @keyframes modalFadeIn { from{opacity:0} to{opacity:1} }
    .modal-box {
      background: var(--surface);
      border: var(--border-w) solid var(--cyan);
      border-radius: var(--radius);
      box-shadow: 8px 8px 0 var(--cyan-glow), 0 0 40px rgba(0, 229, 255, .08);
      width: 90%; max-width: 700px; max-height: 80vh;
      display: flex; flex-direction: column;
      animation: modalSlideIn .15s ease-out;
    }
    @keyframes modalSlideIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: var(--bg);
      border-bottom: 2px solid rgba(0, 229, 255, .2);
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .modal-title {
      font-family: var(--font-display); font-size: 11px; font-weight: 700;
      color: var(--cyan); text-transform: uppercase; letter-spacing: 2px;
      display: flex; align-items: center; gap: 8px;
    }
    .modal-close {
      background: var(--bg); color: var(--red); border: 2px solid var(--red);
      border-radius: 3px; font-family: var(--font-display); font-weight: 700;
      font-size: 11px; padding: 2px 10px; cursor: pointer; letter-spacing: 1px;
      box-shadow: 2px 2px 0 rgba(255, 51, 85, .2); transition: all .1s;
    }
    .modal-close:hover { background: var(--red); color: #fff; }
    .modal-body { padding: 16px; overflow-y: auto; flex: 1; }
    .modal-log {
      background: var(--bg); color: var(--text); font-family: var(--font-code);
      font-size: 12px; line-height: 1.6; padding: 14px; border-radius: var(--radius);
      border: 2px solid rgba(0, 229, 255, .15); white-space: pre-wrap;
      word-break: break-word; min-height: 80px;
    }

    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid rgba(200, 255, 0, .2); border-top-color: var(--lime);
      border-radius: 50%; animation: spin .5s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast-container { position: fixed; bottom: 16px; right: 16px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      font-family: var(--font-code); font-size: 12px; padding: 8px 14px;
      border: var(--border-w) solid; border-radius: var(--radius);
      animation: toastIn .2s ease-out; max-width: 320px;
    }
    .toast-ok { border-color: var(--lime); color: var(--lime); background: var(--surface); box-shadow: 3px 3px 0 var(--lime-glow); }
    .toast-err { border-color: var(--red); color: var(--red); background: var(--surface); box-shadow: 3px 3px 0 rgba(255, 51, 85, .2); }
    @keyframes toastIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--surface-hi); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

    @media (max-width: 900px) {
      .dashboard { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: var(--border-w) solid rgba(0, 229, 255, .2); }
      .main-row { grid-template-columns: 1fr; }
      .sched-form { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>

<div class="glow-bar"></div>

<header class="header">
  <div class="header-left">
    <span class="logo">D-BiCron</span>
    <span class="logo-sub">coredb scheduler</span>
  </div>
  <div class="status-pill">
    <span class="status-dot"></span>
    Online
  </div>
</header>

<div class="dashboard">
  <aside class="sidebar">
    <div class="stitle">
      <span class="stitle-tag lime">&gt;_</span>
      Jobs <span class="count" id="job-count">0</span>
    </div>
    <div id="jobs-list"></div>
  </aside>

  <div class="main">
    <div>
      <div class="stitle">
        <span class="stitle-tag cyan">+</span>
        Create Schedule
      </div>
      <div class="card">
        <div class="card-body">
          <div class="sched-form">
            <div class="field" style="flex:1;min-width:140px">
              <span class="field-label">Job</span>
              <select id="sched-job"></select>
            </div>
            <div class="field">
              <span class="field-label">Cron</span>
              <input id="sched-cron" type="text" placeholder="*/10 * * * *" value="*/10 * * * *" style="width:140px" />
            </div>
            <div class="field">
              <span class="field-label">Days</span>
              <input id="sched-days" type="number" value="1" min="1" style="width:60px" />
            </div>
            <div class="field">
              <span class="field-label">&nbsp;</span>
              <button class="btn btn-cyan" onclick="createSchedule()">+ Register</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="main-row">
      <div class="card">
        <div class="card-body">
          <div class="stitle">
            <span class="stitle-tag yel">&#9776;</span>
            Active Schedules <span class="count" id="sched-count">0</span>
          </div>
          <div id="schedules-list"></div>
        </div>
      </div>
      <div class="card mag-card">
        <div class="card-body">
          <div class="stitle">
            <span class="stitle-tag mag">&#9656;</span>
            Run History <span class="count" id="history-count">0</span>
          </div>
          <div id="history-list"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="log-modal" style="display:none" onclick="if(event.target===this)closeLogModal()">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title"><span id="log-modal-badge"></span> <span id="log-modal-job"></span> — <span id="log-modal-time"></span></div>
      <button class="modal-close" onclick="closeLogModal()">ESC</button>
    </div>
    <div class="modal-body">
      <div class="modal-log" id="log-modal-content"></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
function clearEl(el) { while (el.firstChild) el.removeChild(el.firstChild); }
function makeEl(tag, attrs, children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === "className") el.className = v;
    else if (k.startsWith("on") && typeof v === "function") el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  });
  if (typeof children === "string") el.textContent = children;
  else if (Array.isArray(children)) children.forEach(c => { if (c) el.appendChild(c); });
  return el;
}
async function api(url, opts) {
  const res = await fetch(url, { headers: { "Content-Type": "application/json" }, ...opts });
  return res.json();
}
function openLogModal(h) {
  const modal = document.getElementById("log-modal");
  document.getElementById("log-modal-badge").className = `badge ${h.success ? "badge-ok" : "badge-fail"}`;
  document.getElementById("log-modal-badge").textContent = h.success ? "OK" : "FAIL";
  document.getElementById("log-modal-job").textContent = h.jobName;
  document.getElementById("log-modal-time").textContent = new Date(h.finishedAt).toLocaleString();
  const content = document.getElementById("log-modal-content");
  const parts = [];
  if (h.stdout) parts.push(h.stdout);
  if (h.stderr) parts.push((h.stdout ? "\n\u2500\u2500 stderr \u2500\u2500\n" : "") + h.stderr);
  content.textContent = parts.join("") || "(no output)";
  modal.style.display = "";
}
function closeLogModal() { document.getElementById("log-modal").style.display = "none"; }
document.addEventListener("keydown", e => { if (e.key === "Escape") closeLogModal(); });

function toast(msg, ok) {
  const t = makeEl("div", { className: `toast ${ok ? "toast-ok" : "toast-err"}` }, msg);
  document.getElementById("toasts").appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

async function loadJobs() {
  const jobs = await api("/api/jobs");
  const el = document.getElementById("jobs-list");
  const sel = document.getElementById("sched-job");
  document.getElementById("job-count").textContent = jobs.length;
  clearEl(el); clearEl(sel);
  if (!jobs.length) { el.appendChild(makeEl("div", { className: "empty" }, "No jobs registered")); return; }
  jobs.forEach(j => {
    sel.appendChild(makeEl("option", { value: j.name }, j.label));
    const daysInput = makeEl("input", { type: "number", value: String(j.defaultArgs?.days ?? 1), min: "1" });
    const runBtn = makeEl("button", {
      className: "btn btn-lime btn-sm",
      onClick: async () => {
        runBtn.disabled = true; runBtn.textContent = "";
        runBtn.appendChild(makeEl("span", { className: "spinner" }));
        try {
          await api(`/api/jobs/${encodeURIComponent(j.name)}/run`, { method: "POST", body: JSON.stringify({ days: Number(daysInput.value) || 1 }) });
          toast(`${j.label} completed`, true);
        } catch { toast(`${j.label} failed`, false); }
        runBtn.disabled = false; runBtn.textContent = "RUN";
        loadHistory();
      },
    }, "RUN");
    el.appendChild(makeEl("div", { className: "job-card" }, [
      makeEl("div", { className: "job-name" }, j.label),
      makeEl("div", { className: "job-desc" }, j.description),
      makeEl("div", { className: "job-actions" }, [
        makeEl("div", { className: "field-inline" }, [makeEl("label", null, "days"), daysInput]),
        runBtn,
      ]),
    ]));
  });
}

async function loadSchedules() {
  const list = await api("/api/schedules");
  const el = document.getElementById("schedules-list");
  document.getElementById("sched-count").textContent = list.length;
  clearEl(el);
  if (!list.length) { el.appendChild(makeEl("div", { className: "empty" }, "No active schedules")); return; }
  el.appendChild(makeEl("table", { className: "tbl cyan-tbl" }, [
    makeEl("thead", null, [makeEl("tr", null, [makeEl("th", null, "#"), makeEl("th", null, "Job"), makeEl("th", null, "Cron"), makeEl("th")])]),
    makeEl("tbody", null, list.map(s =>
      makeEl("tr", null, [
        makeEl("td", null, String(s.id)),
        makeEl("td", null, s.jobName),
        makeEl("td", null, [makeEl("code", null, s.cron)]),
        makeEl("td", null, [makeEl("button", { className: "btn btn-red btn-sm", onClick: () => deleteSchedule(s.id) }, "DEL")]),
      ])
    )),
  ]));
}

async function createSchedule() {
  const jobName = document.getElementById("sched-job").value;
  const cronExpr = document.getElementById("sched-cron").value;
  const days = Number(document.getElementById("sched-days").value) || 1;
  try {
    await api("/api/schedules", { method: "POST", body: JSON.stringify({ jobName, cronExpr, args: { days } }) });
    toast("Schedule registered", true);
  } catch { toast("Failed to register", false); }
  loadSchedules();
}

async function deleteSchedule(id) {
  await api(`/api/schedules/${encodeURIComponent(id)}`, { method: "DELETE" });
  toast("Schedule deleted", true);
  loadSchedules();
}

async function loadHistory() {
  const list = await api("/api/history");
  const el = document.getElementById("history-list");
  document.getElementById("history-count").textContent = list.length;
  clearEl(el);
  if (!list.length) { el.appendChild(makeEl("div", { className: "empty" }, "No runs yet")); return; }
  el.appendChild(makeEl("table", { className: "tbl mag-tbl" }, [
    makeEl("thead", null, [makeEl("tr", null, [makeEl("th", null, "Job"), makeEl("th", null, "Status"), makeEl("th", null, "Output"), makeEl("th", null, "Time")])]),
    makeEl("tbody", null, list.map(h => {
      const out = makeEl("td", { className: "output-cell", onClick: () => openLogModal(h) }, h.success ? (h.stdout || "-") : (h.stderr || "-"));
      out.title = "Click to view full log";
      return makeEl("tr", null, [
        makeEl("td", null, h.jobName),
        makeEl("td", null, [makeEl("span", { className: `badge ${h.success ? "badge-ok" : "badge-fail"}` }, h.success ? "OK" : "FAIL")]),
        out,
        makeEl("td", null, new Date(h.finishedAt).toLocaleString()),
      ]);
    })),
  ]));
}

loadJobs(); loadSchedules(); loadHistory();
setInterval(() => { loadSchedules(); loadHistory(); }, 30000);
</script>
</body>
</html>
